# Prompt templates for biomedical entity extraction
# WITHOUT positions (text only) - sempre sem posições
# Versions: zero-shot (0 examples) to few-shot with 32 examples

# ============================================================================
# PROMPT TEMPLATES WITHOUT POSITIONS (text only)
# ============================================================================

# Zero-shot without positions
zero_shot_no_positions: |
  You are a biomedical NLP specialist. Analyze the text below and extract:
  
  1. CHEMICAL SUBSTANCES (Chemical): medications, compounds, drugs, brand names, chemical formulas
  2. DISEASES (Disease): medical conditions, symptoms, diagnoses, syndromes, pathologies
  
  For each entity found, provide only:
  - Entity text (exactly as it appears in the text)
  - Type (Chemical or Disease)
  
  IMPORTANT:
  - If no entities are found, return: {{"entities": []}}
  - Return ONLY valid JSON, without any additional text
  - Keep the entity text exactly as it appears in the original text
  - Extract complete compound entities when medically meaningful
  
  Text: {text}
  
  Respond in JSON format:
  {{
    "entities": [
      {{
        "text": "entity name",
        "type": "Chemical" or "Disease"
      }}
    ]
  }}

