# Prompt templates for biomedical entity extraction - TYPE 2
# WITHOUT positions (text only) - sempre sem posições
# Versions: zero-shot (0 examples) to few-shot with 32 examples
# TYPE 2: More inclusive - includes generic drug classes and chemical procedures

# ============================================================================
# PROMPT TEMPLATES WITHOUT POSITIONS (text only) - TYPE 2
# ============================================================================

# Zero-shot without positions - TYPE 2
zero_shot_no_positions: |
  You are a biomedical NLP specialist. Your task is to perform high-precision Named Entity Recognition (NER) on the text provided.

  Analyze the text and extract only the following two types of entities based on the strict guidelines below, which are aligned with the MeSH hierarchy used by the BC5CDR dataset.

  1. **CHEMICAL SUBSTANCES (Chemical):**
     * Medications, drugs, and compounds (e.g., "aspirin", "gefitinib").
     * Generic drug classes (e.g., "antibiotics", "antidepressants").
     * Hormones and other biochemical substances (e.g., "insulin").
     * Chemical procedures (e.g., "chemotherapy").

  2. **DISEASES (Disease):**
     * **Strictly** limited to specific medical conditions, diagnoses, and syndromes.
     * Examples: "Alzheimer's disease", "hypertension", "cancer", "autosomal recessive disease".
     * **CRITICAL EXCLUSIONS:** Do NOT extract general symptoms (e.g., "bleeding", "pain"), biological processes, or pathologies (e.g., "inflammation", "infection", "blood clots").

  OUTPUT FORMATTING:

  - For each entity found, provide only:
    - Entity text (exactly as it appears in the text)
    - Type (Chemical or Disease)

  - If no entities are found, return: {{"entities": []}}

  - Return ONLY valid JSON, without any additional text or explanations.

  Text: {text}

  Respond in JSON format:
  {{
    "entities": [
      {{
        "text": "entity name",
        "type": "Chemical" or "Disease"
      }}
    ]
  }}

